name: Release CLI
on:
  workflow_dispatch:
  push:
    tags:
      - "cli-v*"

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release URLs are configured
        env:
          BAHAR_WEB_URL: ${{ secrets.BAHAR_WEB_URL }}
          BAHAR_API_URL: ${{ secrets.BAHAR_API_URL }}
        run: |
          if [ -z "$BAHAR_WEB_URL" ] || [ -z "$BAHAR_API_URL" ]; then
            echo "::error::Set the BAHAR_WEB_URL and BAHAR_API_URL secrets (Settings > Secrets and variables > Actions > Secrets) before cutting a CLI release."
            exit 1
          fi

      - name: Build binaries
        working-directory: apps/cli
        env:
          BAHAR_WEB_URL: ${{ secrets.BAHAR_WEB_URL }}
          BAHAR_API_URL: ${{ secrets.BAHAR_API_URL }}
        run: |
          declare -A targets=(
            [bun-linux-x64]=bahar-linux-x64
            [bun-darwin-x64]=bahar-darwin-x64
            [bun-darwin-arm64]=bahar-darwin-arm64
            [bun-windows-x64]=bahar-windows-x64.exe
          )

          for target in "${!targets[@]}"; do
            asset="${targets[$target]}"

            bun build --compile \
              --target="$target" \
              --minify-whitespace \
              --minify-syntax \
              --define "process.env.BAHAR_WEB_URL='$BAHAR_WEB_URL'" \
              --define "process.env.BAHAR_API_URL='$BAHAR_API_URL'" \
              --outfile "$asset" \
              src/index.ts
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            apps/cli/bahar-linux-x64
            apps/cli/bahar-darwin-x64
            apps/cli/bahar-darwin-arm64
            apps/cli/bahar-windows-x64.exe

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Create release and upload binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/bahar-linux-x64 \
            dist/bahar-darwin-x64 \
            dist/bahar-darwin-arm64 \
            dist/bahar-windows-x64.exe \
            --repo "${{ github.repository }}" \
            --title "Bahar CLI ${{ github.ref_name }}" \
            --generate-notes
